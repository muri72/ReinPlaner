name: Database Migration

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Migration file to run'
        required: true
        default: '20260413135246_tenant_isolation.sql'

jobs:
  migrate:
    name: Run Database Migration
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Supabase CLI
        run: |
          # Download and install Supabase CLI binary directly
          curl -sL https://github.com/supabase/cli/releases/download/v2.84.2/supabase_2.84.2_linux_amd64.tar.gz | tar xz
          mv supabase /usr/local/bin/
          supabase --version
      
      - name: Get migration file
        run: |
          echo "Using migration: ${{ inputs.migration_file }}"
          ls -la supabase/migrations/${{ inputs.migration_file }}
      
      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ignrqqicnhlaysqxuejz --access-token "$SUPABASE_ACCESS_TOKEN"
      
      - name: Push migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push --yes --force