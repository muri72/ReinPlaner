# ============================================================
# ReinPlaner — Caddy Docker Compose
# ============================================================
# Usage: docker-compose -f infrastructure/caddy/docker-compose.yml up -d
# ============================================================

services:
  caddy:
    image: caddy:3-alpine
    container_name: reinplaner_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/data
      - ./logs:/var/log/caddy
      - /var/www/coming-soon:/var/www/coming-soon:ro
    environment:
      CADDY_HTTP_PORT: 80
      CADDY_HTTPS_PORT: 443
    mem_limit: 256m
    cpus: 0.5
    networks:
      - reinplaner_internal

networks:
  reinplaner_internal:
    external: true