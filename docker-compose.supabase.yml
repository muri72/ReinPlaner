# ============================================================
# ReinPlaner — Supabase Self-Hosted (Coolify Network)
# ============================================================
# All services connect to both 'coolify' (for Frontend access)
# and 'reinplaner_dev' networks.
# Usage: docker compose -f docker-compose.supabase.yml up -d
# ============================================================

services:
  db:
    image: supabase/postgres:15.8.1.085
    container_name: supabase_db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_USER: supabase_admin
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
      - ./infrastructure/supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - coolify
      - reinplaner_dev

  postgrest:
    image: postgrest/postgrest:v14.8
    container_name: supabase_rest
    environment:
      PGRST_DB_URI: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public, storage, graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_DB_EXTRA_SEARCH_PATH: auth, public, storage
      DATABASE_SEARCH_PATH: public, storage, auth
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coolify
      - reinplaner_dev

  kong:
    image: kong:3.4
    container_name: supabase_kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PLUGINS: request-transformer,cors
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./infrastructure/supabase/config/kong.prod.yml:/usr/local/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coolify
      - reinplaner_dev

  auth:
    image: supabase/gotrue:v2.186.0
    container_name: supabase_auth
    env_file:
      - .env
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_URI_ALLOW_LIST: "*"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coolify
      - reinplaner_dev

  storage:
    image: supabase/storage-api:v1.11.7
    container_name: supabase_storage
    env_file:
      - .env
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_KEY}
      POSTGRES_URL: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_URI: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - supabase_storage_data:/var/lib/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coolify
      - reinplaner_dev

  meta:
    image: supabase/postgres-meta:v0.83.0
    container_name: supabase_meta
    environment:
      PG_META_PORT: 54381
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:54381/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coolify
      - reinplaner_dev

  studio:
    image: supabase/studio:latest
    container_name: supabase_studio
    environment:
      STUDIO_PG_META_URL: http://meta:54381
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: ${API_EXTERNAL_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - meta
    restart: unless-stopped
    networks:
      - coolify
      - reinplaner_dev

  realtime:
    image: supabase/realtime:v2.76.5
    container_name: supabase_realtime
    environment:
      APP_NAME: realtime
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL: "false"
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: 100
      SECURE_CHANNELS: "false"
      SLOT_NAME: supabase_realtime_rls
      TEMPORARY_SLOT: "true"
    healthcheck:
      test: ["CMD", "bash", "-c", "printf '\\0' > /dev/tcp/localhost/4000"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coolify
      - reinplaner_dev

  imgproxy:
    image: darthsim/imgproxy:v3.13
    container_name: supabase_imgproxy
    environment:
      IMGPROXY_PORT: 5001
      IMGPROXY_LOG_LEVEL: info
      IMGPROXY_MAX_SRC_RESOLUTION: 70
      IMGPROXY_MAX_WIDTH_REQUEST: 10000
      IMGPROXY_MAX_HEIGHT_REQUEST: 10000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - coolify
      - reinplaner_dev

volumes:
  supabase_db_data:
  supabase_storage_data:

networks:
  coolify:
    external: true
  reinplaner_dev:
    external: true
