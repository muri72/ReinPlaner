<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4b8c"/>
      <stop offset="50%" style="stop-color:#3a7ec2"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle for visibility -->
  <circle cx="200" cy="200" r="190" fill="none"/>
  
  <!-- Large R letter -->
  <text x="200" y="280" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="220" 
        font-weight="bold" 
        fill="url(#blueGrad)" 
        text-anchor="middle">R</text>
  
  <!-- Sparkle accents -->
  <g transform="translate(290, 100)">
    <polygon points="0,-25 6,-6 25,0 6,6 0,25 -6,6 -25,0 -6,-6" fill="#00b4d8" opacity="0.9"/>
  </g>
  <g transform="translate(100, 120)">
    <polygon points="0,-15 4,-4 15,0 4,4 0,15 -4,4 -15,0 -4,-4" fill="#3a7ec2" opacity="0.7"/>
  </g>
  
  <!-- ReinPlaner text -->
  <text x="200" y="340" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="32" 
        font-weight="bold" 
        fill="#1a4b8c" 
        text-anchor="middle" 
        letter-spacing="1">ReinPlaner</text>
  
  <!-- Tagline -->
  <text x="200" y="365" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="11" 
        fill="#666666" 
        text-anchor="middle">Software für Gebäudereinigung</text>
</svg>
