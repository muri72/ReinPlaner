<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReinPlaner – Kommt bald</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .logo svg {
      width: 80px;
      height: 80px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-bottom: 40px;
    }

    .feature {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.9rem;
      backdrop-filter: blur(5px);
    }

    .footer {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.6);
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.75rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      .logo {
        width: 100px;
        height: 100px;
      }
      .logo svg {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>ReinPlaner – Kommt bald</h1>
    <p class="subtitle">Management-Tool für Reinigungsfirmen</p>
    <div class="features">
      <span class="feature">Auftragsverwaltung</span>
      <span class="feature">Mitarbeiter-Planung</span>
      <span class="feature">Rechnungsstellung</span>
    </div>
    <p class="footer">© 2025 ReinPlaner</p>
  </div>
</body>
</html>
